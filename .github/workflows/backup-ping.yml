name: Backup ping

# Closes the gap flagged 2026-07-05: POST /backup on the live HF Space
# (scripts/supervisor.py) only fires when something calls it -- nothing
# was ever wired to call it automatically, so no backups landed in
# DevOGhere/10-Bit-Village-Data after the last manual/QA trigger.
# This is the external HTTP cron from packet 063's original design
# (Oji's dual-purpose ping: backup + HF keep-alive) that never got built.
#
# A3 (Run 2 Plan §A3, 2026-07-09): GH Actions disables scheduled workflows
# after 60 days of repo inactivity, silently killing this ping (and with
# it the HF keep-alive) -- a landmine for a months-long run. Primary
# liveness now lives on cron-job.org (POST /backup every 30 min, e-mail
# on failure) -- an Oji manual step (needs his e-mail on an external
# account, not something this session can create). This workflow steps
# down to a reduced-cadence FALLBACK once that's set up: still catches a
# cron-job.org outage, but doesn't duplicate the primary cadence.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: POST /backup to the live Space
        run: |
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.TBV_BACKUP_TOKEN }}" \
            --max-time 60 \
            https://devog-10-bit-village.hf.space/backup)
          echo "HTTP $code"
          cat /tmp/resp.txt
          if [ "$code" != "200" ]; then
            echo "::error::backup call failed with HTTP $code"
            exit 1
          fi
